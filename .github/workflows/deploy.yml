name: Deploy

on:
  workflow_dispatch:
  # push:
  #   branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install

      - name: Start PocketBase
        run: |
          printf 'PB_SUPERUSER_EMAIL=admin@disneybounding.com\nPB_SUPERUSER_PASSWORD=password\nPB_SMTP_HOST=mailpit\nPB_SMTP_PORT=1025\n' > pocketbase/.env.local
          docker compose up -d

      - name: Wait for PocketBase to be healthy
        run: until curl -sf http://127.0.0.1:8090/api/health; do sleep 2; done

      - name: Run tests
        run: pnpm test

      - name: Stop services
        if: always()
        run: docker compose down

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /srv/disneybounding
            git pull origin main
            pnpm install --frozen-lockfile
            pnpm build
            pm2 restart nextjs
            docker compose -f docker-compose.prod.yml up -d --build
